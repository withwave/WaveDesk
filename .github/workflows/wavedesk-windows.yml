# Standalone Windows build for the WaveDesk fork.
# Produces a portable (zip) build of the Windows app. Run manually from the
# Actions tab (workflow_dispatch). Mirrors the upstream RustDesk Windows job but
# generates the flutter_rust_bridge files inline (no separate bridge job) and
# skips installer/signing to keep it self-contained.
name: wavedesk-windows

on:
  workflow_dispatch:

env:
  RUST_VERSION: "1.75"
  LLVM_VERSION: "15.0.6"
  FLUTTER_VERSION: "3.24.5"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  FLUTTER_RUST_BRIDGE_VERSION: "1.80.1"
  CARGO_EXPAND_VERSION: "1.0.95"
  VCPKG_DISABLE_METRICS: 1

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-2022
    env:
      VCPKG_ROOT: C:\vcpkg
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@1a3da29f56261a1e1f937ec88f0856a9b8321d7e # v1
        with:
          version: ${{ env.LLVM_VERSION }}

      - name: Install Flutter
        uses: subosito/flutter-action@2783a3f08e1baf891508463f8c6653c258246225 # v2.12.0
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Replace engine with rustdesk custom flutter engine
        run: |
          flutter doctor -v
          flutter precache --windows
          Invoke-WebRequest -Uri https://github.com/rustdesk/engine/releases/download/main/windows-x64-release.zip -OutFile windows-x64-release.zip
          Expand-Archive -Path windows-x64-release.zip -DestinationPath windows-x64-release
          mv -Force windows-x64-release/* C:/hostedtoolcache/windows/flutter/stable-${{ env.FLUTTER_VERSION }}-x64/bin/cache/artifacts/engine/windows-x64-release/

      - name: Patch flutter
        shell: bash
        run: |
          cp .github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff "$(dirname "$(dirname "$(which flutter)")")"
          cd "$(dirname "$(dirname "$(which flutter)")")"
          [[ "3.24.5" == "${FLUTTER_VERSION}" ]] && git apply flutter_3.24.4_dropdown_menu_enableFilter.diff || true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-pc-windows-msvc
          components: "rustfmt"

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          prefix-key: windows-2022

      # The flutter_rust_bridge files (src/bridge_generated.rs,
      # flutter/lib/generated_bridge.dart) are committed to this fork, so no
      # codegen / libclang is needed on the Windows runner.
      - name: Flutter pub get
        shell: bash
        run: |
          cd flutter && flutter pub get

      - name: Setup vcpkg with GitHub Actions binary cache
        uses: lukka/run-vcpkg@b1a0dd252f06b9e25b3c022a9a03bd7a427fb6a2 # v11
        with:
          vcpkgDirectory: C:\vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies
        env:
          VCPKG_DEFAULT_HOST_TRIPLET: x64-windows-static
        shell: bash
        run: |
          if ! $VCPKG_ROOT/vcpkg install --triplet x64-windows-static --x-install-root="$VCPKG_ROOT/installed"; then
            find "${VCPKG_ROOT}/" -name "*.log" | while read -r _1; do echo "$_1:"; echo "======"; cat "$_1"; echo "======"; echo ""; done
            exit 1
          fi

      - name: Build WaveDesk (Windows)
        shell: bash
        run: |
          python3 ./build.py --portable --hwcodec --flutter --vram --skip-portable-pack
          ls -la ./flutter/build/windows/x64/runner/Release

      - name: Package portable zip + self-extracting installer
        shell: bash
        run: |
          VER=$(grep '^version' Cargo.toml | head -1 | sed -E 's/.*"(.*)".*/\1/')
          # Move the build output to ./rustdesk (the exe inside is rustdesk.exe).
          mv ./flutter/build/windows/x64/runner/Release ./rustdesk
          # Portable zip.
          ZIP="wavedesk-${VER}-x64-portable.zip"
          7z a -tzip "$ZIP" ./rustdesk
          # Self-extracting installer (rustdesk-portable-packer).
          ( cd libs/portable && pip3 install -r requirements.txt && \
            python3 ./generate.py -f ../../rustdesk -o . -e ../../rustdesk/rustdesk.exe )
          INSTALLER="wavedesk-${VER}-x64-install.exe"
          mv ./target/release/rustdesk-portable-packer.exe "$INSTALLER"
          ls -la "$ZIP" "$INSTALLER"
          echo "ZIP=$ZIP" >> "$GITHUB_ENV"
          echo "INSTALLER=$INSTALLER" >> "$GITHUB_ENV"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wavedesk-windows
          path: |
            ${{ env.ZIP }}
            ${{ env.INSTALLER }}

      - name: Attach to release v1.4.7-modin
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload v1.4.7-modin "$INSTALLER" "$ZIP" --clobber --repo "${{ github.repository }}"
